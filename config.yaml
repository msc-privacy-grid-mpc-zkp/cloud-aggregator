services:
  server-a:
    image: cloud-aggregator:latest
    environment:
      - SERVER_PORT=8080
      - SERVER_NAME=MPC Node A
      - EXPECTED_METERS=10
    ports:
      - "8080:8080"

  server-b:
    image: cloud-aggregator:latest
    environment:
      - SERVER_PORT=8081
      - SERVER_NAME=MPC Node B
      - EXPECTED_METERS=10
    ports:
      - "8081:8081"

