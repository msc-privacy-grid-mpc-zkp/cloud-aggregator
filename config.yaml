services:
  server-a:
    image: cloud-aggregator:latest
    environment:
      - SERVER_PORT=8080
      - SERVER_NAME=MPC Node A
    ports: ["8080:8080"]

  server-b:
    image: cloud-aggregator:latest
    environment:
      - SERVER_PORT=8081
      - SERVER_NAME=MPC Node B
    ports: ["8081:8081"]

  server-c:
    image: cloud-aggregator:latest
    environment:
      - SERVER_PORT=8082
      - SERVER_NAME=MPC Node C
    ports: ["8082:8082"]